apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: my-app-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: my-app-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>GitOps Demo</title>
        <script>
            function updateTime() {
                document.getElementById('time').innerText = new Date().toLocaleString();
            }
        </script>
    </head>
    <body onload="updateTime()">
        <h1>VERSION 5.0 - GitOps works!</h1>
        <p>Это приложение управляется через Git</p>
        <p>Текущее время: <span id="time"></span></p>
    </body>
    </html>